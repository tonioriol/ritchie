apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openclaw.labels" . | nindent 6 }}
  template:
    metadata:
      {{- if .Values.auth.externalSecret.enabled }}
      annotations:
        secret.reloader.stakater.com/reload: {{ .Release.Name }}-secrets
      {{- end }}
      labels:
        {{- include "openclaw.labels" . | nindent 8 }}
    spec:
      {{- if .Values.kubectl.enabled }}
      serviceAccountName: {{ .Release.Name }}
      {{- end }}
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        # 1. Install system deps + Playwright browser (runs as root)
        - name: install-deps
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ['sh', '-c']
          args:
            - |
              set -e
              MARKER="/openclaw-data/.deps-installed-{{ .Values.image.tag }}"
              if [ -f "$MARKER" ]; then
                echo "Deps already installed for {{ .Values.image.tag }}, checking system libs..."
              fi
              # Install system packages (needed every restart since container fs is ephemeral)
              apt-get update -qq
              apt-get install -y --no-install-recommends \
                git curl wget jq ripgrep htop vim-tiny \
                python3 python3-pip python3-venv \
                build-essential \
                libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
                libcups2 libdbus-1-3 libxkbcommon0 libatspi2.0-0 \
                libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
                libgbm1 libasound2 libpango-1.0-0 libcairo2 \
                libdrm2 libx11-xcb1 libxcb1 \
                fonts-liberation fonts-noto-color-emoji \
                ca-certificates procps apt-transport-https gnupg
              # Install kubectl
              curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
              echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /" > /etc/apt/sources.list.d/kubernetes.list
              apt-get update -qq && apt-get install -y kubectl
              rm -rf /var/lib/apt/lists/*
              # Install Playwright Chromium browser (persisted on PVC)
              export PLAYWRIGHT_BROWSERS_PATH=/openclaw-data/playwright-browsers
              if [ ! -f "$MARKER" ]; then
                echo "Installing Playwright Chromium..."
                node /app/node_modules/playwright-core/cli.js install chromium
                touch "$MARKER"
              fi
              # Fix ownership for node user
              chown -R 1000:1000 /openclaw-data/playwright-browsers 2>/dev/null || true
              echo "Deps installation complete."
          env:
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /openclaw-data/playwright-browsers
            - name: DEBIAN_FRONTEND
              value: noninteractive
          volumeMounts:
            - name: data
              mountPath: /openclaw-data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
        # 2. Generate config from env vars (runs as node user)
        - name: init-config
          image: busybox:1.36
          command: ['sh', '/scripts/init-config.sh']
          {{- if .Values.auth.externalSecret.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
                optional: true
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /openclaw-data
            - name: config
              mountPath: /scripts
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      containers:
        - name: openclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan", "--port", "{{ .Values.service.port }}"]
          env:
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /openclaw-data/playwright-browsers
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.auth.externalSecret.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
                optional: true
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /openclaw-data
              # OpenClaw expects state at OPENCLAW_STATE_DIR
            - name: data
              mountPath: /home/node/.openclaw
              subPath: config
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
