apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openclaw.labels" . | nindent 6 }}
  template:
    metadata:
      {{- if .Values.auth.externalSecret.enabled }}
      annotations:
        secret.reloader.stakater.com/reload: {{ .Release.Name }}-secrets
      {{- end }}
      labels:
        {{- include "openclaw.labels" . | nindent 8 }}
    spec:
      {{- if .Values.kubectl.enabled }}
      serviceAccountName: {{ .Release.Name }}
      {{- end }}
      securityContext:
        fsGroup: 1000
      initContainers:
        # 1. Install kubectl + Playwright Chromium to PVC (runs as root, idempotent)
        - name: install-deps
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ['sh', '-c']
          args:
            - |
              set -e
              MARKER="/openclaw-data/.deps-installed-{{ .Values.image.tag }}"
              # Install kubectl static binary to shared PVC
              mkdir -p /openclaw-data/bin
              if [ ! -f /openclaw-data/bin/kubectl ]; then
                echo "Downloading kubectl..."
                curl -fsSL "https://dl.k8s.io/release/v1.31.4/bin/linux/amd64/kubectl" -o /openclaw-data/bin/kubectl
                chmod +x /openclaw-data/bin/kubectl
              fi
              # Install Playwright Chromium browser (persisted on PVC)
              export PLAYWRIGHT_BROWSERS_PATH=/openclaw-data/playwright-browsers
              if [ ! -f "$MARKER" ]; then
                echo "Installing Playwright Chromium..."
                node /app/node_modules/playwright-core/cli.js install chromium
                touch "$MARKER"
              fi
              # Fix ownership for node user
              chown -R 1000:1000 /openclaw-data 2>/dev/null || true
              echo "PVC deps installation complete."
          env:
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /openclaw-data/playwright-browsers
          volumeMounts:
            - name: data
              mountPath: /openclaw-data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
        # 2. Generate config from env vars (runs as node user)
        - name: init-config
          image: busybox:1.36
          command: ['sh', '/scripts/init-config.sh']
          {{- if .Values.auth.externalSecret.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
                optional: true
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /openclaw-data
            - name: config
              mountPath: /scripts
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      containers:
        - name: openclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          command: ['sh', '/scripts/startup.sh']
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          env:
            - name: OPENCLAW_PORT
              value: "{{ .Values.service.port }}"
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /openclaw-data/playwright-browsers
            - name: PATH
              value: /openclaw-data/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.auth.externalSecret.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
                optional: true
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /openclaw-data
              # OpenClaw expects state at OPENCLAW_STATE_DIR
            - name: data
              mountPath: /home/node/.openclaw
              subPath: config
            - name: config
              mountPath: /scripts
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 36
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
