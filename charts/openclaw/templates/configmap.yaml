apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
data:
  startup.sh: |
    #!/bin/sh
    set -e
    export DEBIAN_FRONTEND=noninteractive
    # Install system packages as root (ephemeral, needed every restart)
    apt-get update -qq
    apt-get install -y --no-install-recommends \
      git curl wget jq ripgrep htop vim-tiny \
      python3 python3-pip python3-venv \
      build-essential \
      libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
      libcups2 libdbus-1-3 libxkbcommon0 libatspi2.0-0 \
      libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
      libgbm1 libasound2 libpango-1.0-0 libcairo2 \
      libdrm2 libx11-xcb1 libxcb1 \
      fonts-liberation fonts-noto-color-emoji \
      ca-certificates procps 2>/dev/null || true
    rm -rf /var/lib/apt/lists/*
    # Drop privileges and exec OpenClaw as the node user
    exec su -s /bin/sh node -c "exec node openclaw.mjs gateway --allow-unconfigured --bind lan --port $OPENCLAW_PORT"
  init-config.sh: |
    #!/bin/sh
    set -e
    CFG_DIR=/openclaw-data/config
    CFG="$CFG_DIR/openclaw.json"
    mkdir -p "$CFG_DIR" /openclaw-data/workspace

    # Resolve ccx proxy URL from env (ExternalSecret)
    CCX_URL="${OPENCLAW_CCX_URL:-http://ccx.tools.svc:80/work/v1}"

    # Always regenerate config from env vars (secrets come from ExternalSecret)
    cat > "$CFG" <<JSONEOF
    {
      "models": {
        "providers": {
          "ccx": {
            "baseUrl": "$CCX_URL",
            "apiKey": "$API_KEY",
            "api": "openai-completions",
            "models": [
              {
                "id": "claude-opus-4-6",
                "name": "Claude Opus 4.6",
                "reasoning": false,
                "input": ["text", "image"],
                "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                "contextWindow": 200000,
                "maxTokens": 16384
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": "ccx/claude-opus-4-6",
          "workspace": "/openclaw-data/workspace"
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "botToken": "$TELEGRAM_BOT_TOKEN",
          "dmPolicy": "pairing"
        }
      },
      "tools": {
        "web": {
          "search": {
            "provider": "brave",
            "apiKey": "$BRAVE_API_KEY"
          }
        },
        "exec": {
          "host": "gateway",
          "security": "full",
          "ask": "off"
        },
        "elevated": {
          "enabled": true
        }
      },
      "browser": {
        "enabled": true,
        "headless": true,
        "noSandbox": true,
        "defaultProfile": "openclaw"
      },
      "gateway": {
        "bind": "lan",
        "port": {{ .Values.service.port }},
        "auth": {
          "mode": "token",
          "token": "$OPENCLAW_GATEWAY_TOKEN"
        },
        "trustedProxies": ["10.244.0.0/16", "10.43.0.0/16"],
        "controlUi": {
          "allowedOrigins": ["https://claw.tonioriol.com"],
          "dangerouslyDisableDeviceAuth": true,
          "allowInsecureAuth": true
        }
      }
    }
    JSONEOF
    # Strip leading whitespace from heredoc (YAML indentation artifact)
    sed -i 's/^    //' "$CFG"
    chmod 600 "$CFG"
